<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Terms of use for Riya Goyal's academic portfolio website." />
    <meta property="og:title" content="Terms of Use - Riya Goyal" />
    <link rel="canonical" href="https://riya2599.github.io/terms.html" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Terms of Use - Riya Goyal</title>
    <link rel="stylesheet" href="./src/styles/reset.css" />
    <link rel="stylesheet" href="./src/styles/design-tokens.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { profile } from './src/data/profile.js';
      import { createNavigation } from './src/components/Navigation.js';
      import { createPageFooter } from './src/components/PageFooter.js';
      import { createElementFromHTML } from './src/utils/dom.js';

      const createTerms = () => createElementFromHTML(\`
        <main class="page-content legal-content">
          <section class="page-hero glass-panel">
            <h1>Terms of Use</h1>
            <p class="last-updated">Last updated: May 13, 2026</p>
          </section>

          <section class="glass-panel">
            <h2>1. Agreement to Terms</h2>
            <p>
              By using this website, you agree to use it for lawful and informational purposes only.
            </p>
          </section>

          <section class="glass-panel">
            <h2>2. Content Use</h2>
            <p>
              The materials on this site are provided for professional, academic, and informational reference. You may view
              and cite public information appropriately, but you may not misrepresent authorship or ownership.
            </p>
          </section>

          <section class="glass-panel">
            <h2>3. Disclaimer</h2>
            <p>
              Information on the site is provided "as is" without guarantees of completeness, accuracy, or suitability for
              any particular purpose.
            </p>
          </section>

          <section class="glass-panel">
            <h2>4. Limitations</h2>
            <p>
              Use of the site is at your own discretion. The site owner is not liable for losses arising from reliance on the
              information provided here.
            </p>
          </section>

          <section class="glass-panel">
            <h2>5. Accuracy of Materials</h2>
            <p>
              Content may be updated, revised, or removed at any time as the academic profile evolves.
            </p>
          </section>

          <section class="glass-panel">
            <h2>6. Links</h2>
            <p>
              External links are provided for convenience. The site owner is not responsible for the content or policies of
              third-party websites.
            </p>
          </section>

          <section class="glass-panel">
            <h2>7. Modifications</h2>
            <p>
              These terms may be revised as the website changes. Continued use of the website implies acceptance of the current version.
            </p>
          </section>

          <section class="glass-panel">
            <h2>8. Contact</h2>
            <p>If you have questions about these terms, please contact:</p>
            <ul class="detail-list">
              <li>Email: <a href="mailto:${profile.email}">${profile.email}</a></li>
              <li>Location: ${profile.location}</li>
            </ul>
          </section>
        </main>
      \`);

      const app = document.querySelector('#app');
      const page = document.createElement('div');
      page.className = 'page-shell';
      page.append(
        createNavigation(profile),
        createTerms(),
        createPageFooter(profile)
      );
      app.append(page);
    </script>
  </body>
</html>
