<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Privacy policy for Riya Goyal's academic portfolio website." />
    <meta property="og:title" content="Privacy Policy - Riya Goyal" />
    <link rel="canonical" href="https://riya2599.github.io/privacy.html" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Privacy Policy - Riya Goyal</title>
    <link rel="stylesheet" href="./src/styles/reset.css" />
    <link rel="stylesheet" href="./src/styles/design-tokens.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { profile } from './src/data/profile.js';
      import { createNavigation } from './src/components/Navigation.js';
      import { createPageFooter } from './src/components/PageFooter.js';
      import { createElementFromHTML } from './src/utils/dom.js';

      const createPrivacy = () => createElementFromHTML(\`
        <main class="page-content legal-content">
          <section class="page-hero glass-panel">
            <h1>Privacy Policy</h1>
            <p class="last-updated">Last updated: May 13, 2026</p>
          </section>

          <section class="glass-panel">
            <h2>1. Introduction</h2>
            <p>
              This website is a public academic portfolio for Riya Goyal. It is intended to share research,
              project, and professional background information.
            </p>
          </section>

          <section class="glass-panel">
            <h2>2. Information We Collect</h2>
            <p>This site does not use a custom backend or account system. Information may be received only in limited cases:</p>
            <ul class="detail-list">
              <li>If you send an email, any information included in that email is voluntarily provided by you.</li>
              <li>Standard hosting or browser logs may be collected by the hosting platform as part of normal web delivery.</li>
            </ul>
          </section>

          <section class="glass-panel">
            <h2>3. Use of Your Information</h2>
            <p>Any information voluntarily shared through email may be used only to:</p>
            <ul class="detail-list">
              <li>Respond to your message</li>
              <li>Continue a professional or academic conversation requested by you</li>
              <li>Maintain basic correspondence records when necessary</li>
            </ul>
          </section>

          <section class="glass-panel">
            <h2>4. Disclosure of Your Information</h2>
            <p>
              Personal information received through direct communication is not sold or intentionally shared with third
              parties, except where disclosure is required by law or necessary to protect rights and safety.
            </p>
          </section>

          <section class="glass-panel">
            <h2>5. Security of Your Information</h2>
            <p>
              Reasonable efforts are made to use standard email and hosting practices responsibly. No internet-based
              transmission or storage system can be guaranteed to be fully secure.
            </p>
          </section>

          <section class="glass-panel">
            <h2>6. External Links</h2>
            <p>This website links to external platforms such as GitHub, LinkedIn, and DOI pages. Their privacy practices are governed by their own policies.</p>
          </section>

          <section class="glass-panel">
            <h2>7. Contact</h2>
            <p>For questions about this policy, please contact:</p>
            <ul class="detail-list">
              <li>Email: <a href="mailto:${profile.email}">${profile.email}</a></li>
              <li>Location: ${profile.location}</li>
            </ul>
          </section>
        </main>
      \`);

      const app = document.querySelector('#app');
      const page = document.createElement('div');
      page.className = 'page-shell';
      page.append(
        createNavigation(profile),
        createPrivacy(),
        createPageFooter(profile)
      );
      app.append(page);
    </script>
  </body>
</html>
