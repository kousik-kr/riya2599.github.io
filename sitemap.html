<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HTML sitemap for Riya Goyal's academic portfolio website." />
    <meta property="og:title" content="Sitemap - Riya Goyal" />
    <link rel="canonical" href="https://riya2599.github.io/sitemap.html" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Sitemap - Riya Goyal</title>
    <link rel="stylesheet" href="./src/styles/reset.css" />
    <link rel="stylesheet" href="./src/styles/design-tokens.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { profile } from './src/data/profile.js';
      import { createNavigation } from './src/components/Navigation.js';
      import { createPageFooter } from './src/components/PageFooter.js';
      import { createElementFromHTML } from './src/utils/dom.js';

      const createSitemap = () => createElementFromHTML(\`
        <main class="sitemap-page">
          <section class="page-hero glass-panel">
            <h1>Site Map</h1>
            <p class="page-subtitle">Navigate through the complete research portfolio and supporting pages.</p>
          </section>

          <section class="glass-panel">
            <h2>Main Pages</h2>
            <ul class="sitemap-list">
              <li><a href="/">Home</a> - Research overview, key metrics, and highlights</li>
              <li><a href="/about.html">About</a> - Background, research direction, and positioning</li>
              <li><a href="/research.html">Research</a> - Publications and research themes</li>
              <li><a href="/projects.html">Projects</a> - Applied AI and software portfolio</li>
              <li><a href="/education.html">Education</a> - Academic formation and scores</li>
              <li><a href="/experience.html">Experience</a> - Research and AI internship work</li>
              <li><a href="/awards.html">Recognition</a> - Academic distinctions and milestones</li>
              <li><a href="/teaching.html">Credentials</a> - Certifications and academic activities</li>
              <li><a href="/skills.html">Skills</a> - Technical breadth and professional strengths</li>
              <li><a href="/contact.html">Contact</a> - Direct contact and professional links</li>
            </ul>
          </section>

          <section class="glass-panel">
            <h2>Supporting Pages</h2>
            <ul class="sitemap-list">
              <li><a href="/sitemap.html">Sitemap</a> - Navigation overview</li>
              <li><a href="/privacy.html">Privacy Policy</a> - Data and communication policy</li>
              <li><a href="/terms.html">Terms of Use</a> - Usage conditions and disclaimers</li>
            </ul>
          </section>

          <section class="glass-panel">
            <h2>Quick Links</h2>
            <ul class="sitemap-list">
              <li><a href="${profile.cvUrl}" target="_blank">Download CV (PDF)</a></li>
              <li><a href="${profile.resumeUrl}" target="_blank">Download Resume (PDF)</a></li>
              <li><a href="mailto:${profile.email}">Email Contact</a></li>
            </ul>
          </section>
        </main>
      \`);

      const app = document.querySelector('#app');
      const page = document.createElement('div');
      page.className = 'page-shell';
      page.append(
        createNavigation(profile),
        createSitemap(),
        createPageFooter(profile)
      );
      app.append(page);
    </script>
  </body>
</html>
